<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMSL Study Docs</title>
  <script src="vendor/marked.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #5b6472;
      --line: #d8dee8;
      --blue: #1d4ed8;
      --teal: #0f766e;
      --code: #f1f5f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.68;
      letter-spacing: 0;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
    }

    .top {
      padding: 22px 0 18px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-bottom: 12px;
      color: var(--teal);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      padding: 24px 0 56px;
    }

    article {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 28px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
    }

    article h1,
    article h2,
    article h3 {
      line-height: 1.3;
      letter-spacing: 0;
    }

    article h1 {
      margin: 0 0 18px;
      font-size: 30px;
    }

    article h2 {
      margin: 28px 0 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      font-size: 23px;
    }

    article h3 {
      margin: 22px 0 10px;
      font-size: 18px;
    }

    article p {
      margin: 0 0 14px;
    }

    article ul,
    article ol {
      margin: 0 0 16px 22px;
      padding: 0;
    }

    article li + li {
      margin-top: 5px;
    }

    pre {
      overflow-x: auto;
      margin: 14px 0 18px;
      border-radius: 8px;
      background: var(--code);
      padding: 16px;
      font-size: 13px;
      line-height: 1.55;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--code);
      border-radius: 4px;
      padding: 1px 4px;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    blockquote {
      margin: 16px 0;
      border-left: 4px solid var(--teal);
      background: #ecfdf5;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      color: #134e4a;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <a class="back" href="index.html">← 학습 포털로 돌아가기</a>
      <h1 id="page-title">문서</h1>
      <p class="meta" id="page-meta">Markdown 문서를 읽기 화면으로 렌더링합니다.</p>
    </div>
  </header>
  <main>
    <div class="wrap">
      <article id="content">문서를 불러오는 중입니다.</article>
    </div>
  </main>
  <script>
    const docs = {
      orientation: ["Section 0 준비", "learning/ORIENTATION.md"],
      quickstart: ["빠른 실행 순서", "learning/QUICKSTART.md"],
      live: ["API key와 연결 테스트", "learning/LIVE_API_GUIDE.md"],
      concepts: ["핵심 개념", "learning/CONCEPT_GUIDE.md"],
      lecture: ["강의 노트", "learning/LECTURE_NOTES.md"],
      practicals: ["실습 과제", "learning/PRACTICALS.md"],
      examples: ["예제 코드 사용법", "learning/EXAMPLES.md"],
      expected: ["결과 확인 기준", "learning/EXPECTED_OUTPUTS.md"],
      troubleshooting: ["오류 해결", "learning/TROUBLESHOOTING.md"],
      linux: ["Section 5 Linux/WSL2", "learning/LINUX_SPECIAL_CLASS.md"]
    };

    function docKeyForPath(path) {
      const normalized = path.replace(/^learning\//, "");
      const entry = Object.entries(docs).find((item) => item[1][1].endsWith(normalized));
      return entry ? entry[0] : null;
    }

    function rewriteDocLinks(markdown) {
      return markdown.replace(/\]\((?:learning\/)?([A-Z_]+\.md)\)/g, function (match, filename) {
        const key = docKeyForPath(filename);
        return key ? `](docs.html?doc=${key})` : match;
      });
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function inlineMarkdown(value) {
      let html = escapeHtml(value);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, href) {
        if (/^[A-Z_]+\.md$/.test(href) || href.startsWith("learning/")) {
          const key = docKeyForPath(href);
          if (key) {
            return `<a href="docs.html?doc=${key}">${label}</a>`;
          }
        }
        return `<a href="${escapeHtml(href)}">${label}</a>`;
      });
      return html;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let inCode = false;
      let code = [];
      let listType = null;

      function closeList() {
        if (listType) {
          out.push(`</${listType}>`);
          listType = null;
        }
      }

      function openList(type) {
        if (listType !== type) {
          closeList();
          out.push(`<${type}>`);
          listType = type;
        }
      }

      for (const line of lines) {
        if (line.startsWith("```")) {
          if (inCode) {
            out.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
            code = [];
            inCode = false;
          } else {
            closeList();
            inCode = true;
          }
          continue;
        }

        if (inCode) {
          code.push(line);
          continue;
        }

        if (!line.trim()) {
          closeList();
          continue;
        }

        const heading = line.match(/^(#{1,3})\s+(.*)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          out.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        if (line.startsWith("> ")) {
          closeList();
          out.push(`<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`);
          continue;
        }

        const unordered = line.match(/^\s*[-*]\s+(.*)$/);
        if (unordered) {
          openList("ul");
          out.push(`<li>${inlineMarkdown(unordered[1])}</li>`);
          continue;
        }

        const ordered = line.match(/^\s*\d+\.\s+(.*)$/);
        if (ordered) {
          openList("ol");
          out.push(`<li>${inlineMarkdown(ordered[1])}</li>`);
          continue;
        }

        closeList();
        out.push(`<p>${inlineMarkdown(line)}</p>`);
      }

      closeList();
      if (inCode) {
        out.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
      }
      return out.join("\n");
    }

    const params = new URLSearchParams(location.search);
    const key = params.get("doc") || "orientation";
    const doc = docs[key] || docs.orientation;
    document.getElementById("page-title").textContent = doc[0];
    document.getElementById("page-meta").textContent = doc[1];

    fetch(doc[1], { cache: "no-cache" })
      .then((response) => {
        if (!response.ok) throw new Error("문서를 불러오지 못했습니다.");
        return response.text();
      })
      .then((markdown) => {
        const prepared = rewriteDocLinks(markdown);
        if (window.marked) {
          marked.setOptions({ mangle: false, headerIds: false });
          // Only render curated local Markdown from the docs allowlist above.
          // Do not add user-generated Markdown here without sanitizing it first.
          document.getElementById("content").innerHTML = marked.parse(prepared);
        } else {
          document.getElementById("content").innerHTML = renderMarkdown(prepared);
        }
      })
      .catch((error) => {
        document.getElementById("content").textContent = error.message;
      });
  </script>
</body>
</html>
